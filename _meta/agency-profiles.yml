note: 'Curated context about each agency''s DATA, not the data itself: governance class (with a required
  citation basis), where the agency publishes its policies (or that it doesn''t), and quality caveats.
  Keyed by registry slug (_meta/catalog/agencies.yml); schema-validated (_meta/schema/agency-profile.schema.json).
  Derived stats (doc counts, OCR counts, last-checked dates) are computed fresh by src/agency_profile.py
  — never stored here. ''unclassified''/''unknown'' are honest defaults awaiting human curation; a classification
  without a citation is an invented claim and the schema rejects it.'
