group: department-of-human-services-policies
title: Department of Human Services policies
kind: content-hash
recheck: monthly
last_checked: '2026-07-21'
upstream_signal: 'SharePoint LIST (not a document library) at /odhs/rules-policy (Lists/policiesguidelines),
  queried via RenderListDataAsStream, same API technique as the sharepoint doc-library profiles but with
  structured columns (PolicyNumber, Agency_x0020_1, EffectiveDate, PoliciesAndGuidelinesTitle=PDF url,
  .desc=title) instead of FileRef paths. This is the same list ISPO''s manifest was built from; filtered
  here to rows whose Agency_x0020_1 is exactly ''ODHS'' (DHS-only administrative/agency policies, not
  shared with OHA, and not the separate program Transmittals system, which this list does not contain).
  No POLICY_PROFILES discovery function fits a SharePoint LIST (only doc-library and DOC-style static-HTML
  are implemented), so this manifest was built by hand from the list''s own rows; PDFs are served from
  sharedsystems.dhsoha.state.or.us, which sends an incomplete TLS chain (missing DigiCert Global G2 TLS
  RSA SHA256 2020 CA1 intermediate) -- ingest with SSL_CERT_FILE set to a bundle that supplies that intermediate
  (chain completion, not verification bypass). Freshness: re-query the list, diff PolicyNumber set, re-hash
  members.'
