# Curation data for llms.txt — the ONLY hand-edited part of that file.
# llms.txt itself is GENERATED by src/build_llms.py (counts, coverage enumerations,
# and structure are derived from the corpus + catalogs each run; CI fails when stale).
# Edit THIS file to change titles, "when to consult" prose, or highlighted documents;
# never edit llms.txt directly. The generator errors if a highlight path no longer
# exists, so curation rot fails CI instead of shipping broken links.
title: Oregon Executive-Branch Knowledge Repository (DAS pilot)
header: >-
  Curated, NON-AUTHORITATIVE copies of the statutes, administrative rules,
  executive orders, policies, and standards governing Oregon executive-branch agencies,
  starting with the Department of Administrative Services (DAS). Every document carries
  provenance frontmatter and links to its official source — always verify there. The
  FULL VERBATIM TEXT of every state-authored document is included in-repo under each
  file's '## Full text' section (no external fetch needed to quote policy language);
  third-party standards are summarized with links to official sources only. Agent
  rules live in AGENTS.md.
sections:
  - key: statutes
    title: Statutes (ORS)
    consult: Consult for the legal authority behind any rule or policy.
    highlights:
      - path: statutes/ors-276a.300.md
        label: ORS 276A.300 — Information systems security in executive department
        note: the State CIO's authority over executive-branch information security;
          the statutory root of the whole security stack.
      - path: statutes/ors-276a.303.md
        label: ORS 276A.303 — Security for SoS, Treasurer, AG
        note: why those offices are excluded from DAS security policies.
      - path: statutes/ors-276a.306.md
        label: ORS 276A.306 — Security incidents and assessments
        note: definitions grounding incident response and CSS assessments.
  - key: rules
    title: Administrative Rules (OAR)
    consult: Old "OAR 125-800" citations resolve to 128-030.
    highlights:
      - path: rules/128/030/oar-128-030-0020.md
        label: OAR 128-030-0020 — State Information Security
        note: DAS as primary point of accountability; agency duties. Also
          128-030-0005 (purpose) and 128-030-0010 (definitions) beside it.
  - key: executive-orders
    title: Executive Orders
    consult: Orders are immutable — check the index or `_meta/catalog/eo.yml` for
      whether an order has in-repo text before quoting; most sources are image-only
      scans (metadata + official link only).
  - key: agencies/department-of-administrative-services/policies
    title: DAS Policies
    consult: Mirrors the DAS policies listing of record (Facilities, General,
      Procurement, IT Assets/General/Security, and the full HR corpus).
    highlights:
      - path: agencies/department-of-administrative-services/policies/das-107-004-052.md
        label: DAS 107-004-052 — Cyber and Information Security
        note: the statewide security program policy — roles (State CISO, agency heads,
          users), enterprise security baseline, CSS assessments, offshoring
          prohibition. Companion procedure 107-004-052_PR in ../procedures/.
      - path: agencies/department-of-administrative-services/policies/das-107-004-050.md
        label: Security cluster — 107-004-050 asset classification
        note: siblings 107-004-010 asset inventory · -051 removable media · -100
          transporting assets · -110 acceptable use · -120 incident response · -140
          privileged access · -150 cloud/hosted · -160 data governance.
      - path: agencies/department-of-administrative-services/policies/das-107-001-020.md
        label: DAS 107-001-020 — Public Records Management
        note: retention, disposition, and public-records duties.
      - path: agencies/department-of-administrative-services/policies/das-50-010-01.md
        label: HR corpus — 50-010-01 discrimination & harassment free workplace
        note: siblings include 50-000-01 drug-free · 50-010-02 workplace violence ·
          50-010-03 professional conduct · 50-020-10 ADA/accommodation · 50-035-01
          performance management · 50-050-01 remote work · 50-090-01 improper conduct
          reporting.
  - key: agencies/department-of-administrative-services/procedures
    title: DAS Procedures
    consult: Procedures (`_pr.md`) implement DAS statewide policies — a procedure's
      policy is its number minus the `_PR` suffix (e.g. 107-004-052_PR implements
      107-004-052).
  - key: agencies/department-of-administrative-services/accounting-manual
    title: DAS Accounting Manual (OAM)
    consult: Older documents come as split `.po` policy / `.pr` procedure pairs; some
      files are pending drafts not in the listing of record (status
      `proposed`/`draft`) — always check frontmatter `status` before treating a
      document as current.
  - key: agencies/department-of-administrative-services/standards
    title: DAS Standards (EIS/CSS)
    consult: The non-policy documents policies require agencies to uphold, issued
      under ORS 276A.300.
    highlights:
      - path: agencies/department-of-administrative-services/standards/eis-css-itcs.md
        label: Statewide IT Control Standards (Jan 2024)
        note: the baseline control catalog agencies must meet (NIST SP 800-53 r5
          aligned); per-family inventories in eis-css-it-control-standards/.
      - path: agencies/department-of-administrative-services/standards/eis-css-secplan.md
        label: Statewide Information Security Plan (2018)
        note: with the 2023 Security Program Plan (eis-css-program-plan-2023) beside it.
  - key: external-references
    title: External References
    consult: Summaries + links only — never full text.
    highlights:
      - path: external-references/nist-sp-800-53-r5.md
        label: NIST SP 800-53 Rev. 5
        note: the control framework behind the statewide standards.
