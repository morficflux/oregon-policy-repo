note: >
  Discovery map of DAS statewide policies. The canonical index page
  (oregon.gov/das/Pages/policies.aspx) renders its policy list via client-side JavaScript
  against a SharePoint data source with no public sitemap or API discovered, so this catalog
  is compiled from search-engine indexing of individual policy PDFs (retrieved 2026-07-18)
  rather than one authoritative listing. It is best-effort and almost certainly incomplete —
  treat gaps as "not yet discovered," not "does not exist." Titles marked "(title TBD)" were
  not confirmed from a search snippet and must be verified at ingestion, never assumed.
