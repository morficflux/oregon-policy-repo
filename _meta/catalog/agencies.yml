note: 'Canonical registry of Oregon executive-branch agencies/boards/commissions/divisions, grounded in
  the Secretary of State''s Blue Book directory (an earlier data.oregon.gov-sourced registry was dropped
  2026-07-18 as unreliable). Names are mechanically reconstructed from the Blue Book''s comma-inverted
  Title field (first-comma split-and-swap; a trailing '' - PARENTABBR'' on ~14 division/program rows is
  captured as parent_abbr, not reordered into the name). validate_frontmatter.py requires every content
  file''s agency: field to resolve to ''statewide'', ''external'', or a slug here.'
source_url: https://sos.oregon.gov/blue-book/government/pages/state-agencies.aspx
