  assignment lives with the SoS Administrative Rules Unit). Proper names come from each chapter page''s
  own title; the index tree provides the parent/sub-unit hierarchy (parent_chapter/parent_slug). Third
  registry source: a data.oregon.gov dataset and the SoS Blue Book directory were both previously used
  and dropped after review (2026-07-18/19). validate_frontmatter.py requires every content file''s agency:
  field to resolve to ''statewide'', ''external'', or a slug here.'
