note: Oregon Legislative Counsel's official ORS renumbering table, one entry per edition found (Legislative
  Counsel overwrites the same URL in place each biennium and keeps no historical archive of it — past
  editions here were recovered via Wayback Machine captures of that URL, hand-verified against each PDF's
  own printed edition title; 2017 is the earliest capture available, not necessarily the earliest edition
  that ever existed). 'resolved_chains' merges every edition's single-section-to-single-section mappings
  and walks each starting number to its final current section, which is what actually gets applied to
  relationships.supersedes. Advisory (multi-section list/range) rows are recorded per-edition below for
  human reference only — never auto-expanded or chained, since the table gives no positional correspondence
  to safely follow. Non-authoritative; verify against the source PDFs before relying on any entry here.
