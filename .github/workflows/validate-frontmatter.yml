name: validate-frontmatter

# PRs and pushes validate only the CHANGED files plus the fast/moderate staleness gates;
# the two heaviest full-corpus scans (review_queue, enrich_oar) and the full-corpus
# frontmatter validation run only nightly (cron) and on manual dispatch — at ~68k files
# they blow past a reasonable per-PR budget.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 8 * * *"   # nightly full-corpus audit
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so --changed can compute the merge-base
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml jsonschema
      - name: Validate frontmatter
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              git fetch --no-tags origin "${{ github.base_ref }}"
              python3 src/validate_frontmatter.py --changed "origin/${{ github.base_ref }}" -j2 ;;
            push)
              python3 src/validate_frontmatter.py --changed "${{ github.event.before }}" -j2 ;;
            *)  # schedule / workflow_dispatch — full corpus
              python3 src/validate_frontmatter.py -j2 ;;
          esac

      # --- generated-file staleness gates (moderate; every run) ---
      - name: Relationship graph must be current
        run: python3 src/link_graph.py --check
      - name: llms.txt must be current
        run: python3 src/build_llms.py --check
      - name: Agency overview must be current
        run: python3 src/build_agency_index.py --check
      - name: Agency authority-graph visualization must be current
        run: python3 src/build_agency_graph.py --check
      - name: Policy-documentation-gap view must be current
        run: python3 src/build_policy_gap.py --check
      - name: Statute-operationalization view must be current
        run: python3 src/build_statute_fan.py --check
      - name: Authority-chain explorer must be current
        run: python3 src/build_authority_explorer.py --check
      - name: Semantic topic map must be current (reads committed UMAP cache)
        run: python3 src/build_topic_map.py --check
      - name: Regulatory-freshness dataset must match the graph
        run: python3 src/build_freshness_data.py --check
      - name: Regulatory-freshness visualization must be current
        run: python3 src/build_freshness.py --check
      - name: Semantic vector index must be current (soft-pass if not built)
        run: python3 src/build_embeddings.py --check
      - name: Policy-age visualization must be current
        run: python3 src/build_policy_age.py --check
      - name: Governor-priorities dataset must match the graph
        run: python3 src/build_governor_priorities_data.py --check
      - name: Governor-priorities visualization must be current
        run: python3 src/build_governor_priorities.py --check
      - name: Conflict-candidates dataset must match the graph (verifies every citation)
        run: python3 src/build_conflict_candidates_data.py --check
      - name: Conflict-candidates visualization must be current
        run: python3 src/build_conflict_candidates.py --check

      # --- heaviest full-corpus scans: nightly / on-demand only ---
      # agency_profile/mcp_lib selftests moved here: both scan every one of ~68k files'
      # frontmatter with no cross-process cache (agency_profile's in-memory stats cache only
      # helps a long-lived process like the MCP server, not a fresh CI checkout), so each now
      # takes several minutes — too slow for the per-PR fast tier, same tradeoff already made
      # for review_queue/enrich_oar/enrich_statutes below.
      - name: Agency profile engine selftest (nightly)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python3 src/agency_profile.py --selftest
      - name: MCP query engine selftest (nightly)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python3 src/mcp_lib.py --selftest
      - name: Policy-age dataset must match the corpus (nightly; full-corpus scan)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python3 src/build_policy_age_data.py --check
      - name: Review queue must be current (nightly)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python3 src/review_queue.py --check
      - name: ORS frontmatter must match each statute's own history notes (nightly)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python3 src/enrich_statutes.py --check
      - name: OAR frontmatter must match each rule's own structured lines (nightly)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python3 src/enrich_oar.py --check
