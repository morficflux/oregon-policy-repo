name: detect-upstream-changes

# Cron retired 2026-07-18: routine update checking is done on demand via the
# /check-updates skill (.claude/skills/check-updates), scoped per update group
# (_meta/sources/*.yml). This workflow remains as a manual full sweep.
on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update -q && sudo apt-get install -y poppler-utils
      - run: pip install pyyaml
      - name: Re-fetch sources and diff hashes
        id: detect
        run: python3 src/detect_changes.py --github-output "$GITHUB_OUTPUT"
      - name: Open issues for changed sources
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          while IFS=$'\t' read -r id url old new; do
            [ -z "$id" ] && continue
            title="Source changed: $id"
            if gh issue list --label source-change --state open --search "in:title \"$title\"" --json number --jq length | grep -qv '^0$'; then
              echo "Issue already open for $id, skipping"
              continue
            fi
            gh issue create --label source-change --title "$title" --body "$(printf 'Automated detection.\n\n- **Document id**: %s\n- **Source URL**: %s\n- **Previous sha256**: %s\n- **New sha256**: %s\n- **Detected**: %s\n\nWork this issue per the source-change checklist (.github/ISSUE_TEMPLATE/source-change.md).' "$id" "$url" "$old" "$new" "$(date -I)")"
          done < changed-sources.tsv
