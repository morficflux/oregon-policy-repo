name: codeowners-validate

on:
  pull_request:
    paths: [".github/CODEOWNERS"]
  push:
    branches: [main]
    paths: [".github/CODEOWNERS"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mszostok/codeowners-validator@v0.7.4
        with:
          checks: files,duppatterns,syntax
